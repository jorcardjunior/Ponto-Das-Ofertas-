services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    environment:
      - DATABASE_URL=${DATABASE_URL:?Configure DATABASE_URL no .env}
      - AUTH_SECRET=${AUTH_SECRET:?Configure AUTH_SECRET no .env}
      - XAI_API_KEY=${XAI_API_KEY}
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
    restart: unless-stopped
