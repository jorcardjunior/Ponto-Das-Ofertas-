services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ponto-ofertas-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:?Configure DATABASE_URL in .env}
      - AUTH_SECRET=${AUTH_SECRET:?Configure AUTH_SECRET in .env}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - NODE_ENV=production
      - SKIP_ENV_VALIDATION=1
    expose:
      - "3000"
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: ponto-ofertas-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    networks:
      - webnet

  certbot:
    image: certbot/certbot
    container_name: ponto-ofertas-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/conf.d:/etc/nginx/conf.d
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/lib/letsencrypt --quiet; done;'"
    networks:
      - webnet

volumes:
  certbot-etc:
  certbot-var:

networks:
  webnet:
    driver: bridge
